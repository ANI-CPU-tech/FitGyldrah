services:
  db:
    image: postgres:15-alpine
    container_name: fitgyldrah_db
    restart: always
    env_file:
      - .env
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ADD THIS HEALTHCHECK:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: fitgyldrah_backend
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    # UPDATE DEPENDS_ON TO WAIT FOR THE HEALTHCHECK:
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: fitgyldrah_frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
